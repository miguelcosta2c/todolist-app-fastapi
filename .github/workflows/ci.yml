name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

permissions: {}

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Instalar uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Instalar dependências do backend (Dev)
        working-directory: backend
        run: uv sync --frozen --only-group dev

      - name: Ruff check
        working-directory: backend
        run: uv run ruff check src tests

      - name: Ruff format
        working-directory: backend
        run: uv run ruff format --check src tests

      - name: Pyright type-check
        working-directory: backend
        run: uv run pyright

  lint-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configurar Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências do frontend
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc -b

      - name: ESLint
        working-directory: frontend
        run: npx eslint .

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: ci_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Instalar uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Instalar dependências do backend (Incluindo ferramentas de teste)
        working-directory: backend
        run: uv sync --frozen

      - name: Executar testes com cobertura
        working-directory: backend
        run: uv run python -m pytest tests/ --cov=app --cov-report=term-missing
        env:
          HOST: "0.0.0.0"
          PORT: "8000"
          DATABASE_URL: "postgresql+asyncpg://ci_user:ci_password@localhost:5432/ci_db"
          ALEMBIC_DATABASE_URL: "postgresql://ci_user:ci_password@localhost:5432/ci_db"
          SECRET_KEY: "uma-chave-secreta-qualquer-para-o-ambiente-de-ci"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          ENVIRONMENT: "testing"
          ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
          TRUSTED_HOSTS: '["localhost","127.0.0.1","api"]'

  build:
    needs: [lint-backend, lint-frontend, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build Docker images
        run: docker compose build
